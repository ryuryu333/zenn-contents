title: "ちいさくはじめる Nix"
summary: |
  Nix に興味があるけど、何から始めたらいいかわからない人のための入門書です。
  Homebrew など従来のパッケージ管理の状態から少しずつ Nix 管理に置き換えていく方法を解説します。
  Nix を活用するのに必要な知識を体系的にまとめるのを目的としています。
